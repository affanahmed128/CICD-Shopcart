name: Deploy on AWS

on:
  workflow_run:
    workflows: ["Sample react CI pipeline / workflow"]
    types:
      - completed
  workflow_dispatch:

jobs:
  deploy:
    runs-on: self-hosted
    environment: production

    steps:
      # 1️⃣ Checkout code (REQUIRED)
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2️⃣ Setup Node (LTS)
      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '18'

      # 3️⃣ Install backend dependencies
      - name: Install dependencies
        working-directory: ShopCart-Ecommerce-Backend
        run: npm install

      # 4️⃣ Install PM2 globally
      - name: Install PM2
        run: npm install -g pm2

      # 5️⃣ Run backend tests (optional)
      - name: Run tests
        working-directory: ShopCart-Ecommerce-Backend
        run: npm test --if-present

      # 6️⃣ Deploy / Restart app with PM2
      - name: Deploy to AWS
        working-directory: ShopCart-Ecommerce-Backend
        run: |
          pm2 restart shopcart || pm2 start src/index.js --name shopcart
          pm2 save
