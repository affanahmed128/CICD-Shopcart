name: "Deploy on aws"
on:
  workflow_run:
    workflows: ["Sample react CI pipeline / workflow"]
    types:
      - completed
  workflow_dispatch:  

jobs:
  deploy:
    runs-on: self-hosted
    environment: production
    steps:

      - name: "Setup Node.js"
        uses: actions/setup-node@v5
        with:
          node-version: '20' # Use LTS for stability

      - name: "Install dependencies"
        run: npm install 
      
      - name: "Install pm2 globally"
        run: npm install pm2 -g

      - name: "Run tests"
        run: npm test  

      - name: "Deploy to AWS"
        run: pm2 start src/index.js
